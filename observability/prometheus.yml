# Prometheus scrape config for the local AegisRoute stack. Prometheus runs in
# the same Compose network, so it reaches the two processes by service name and
# their real container ports (not the host-published ports). Both expose the
# fixed aegisroute_* collectors on /metrics.

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: gateway-api
    static_configs:
      - targets: ["gateway-api:8080"]
        labels:
          service: gateway-api

  - job_name: control-worker
    static_configs:
      - targets: ["control-worker:9100"]
        labels:
          service: control-worker
