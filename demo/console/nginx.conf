# Demo console vhost. Serves the static console page and reverse-proxies the
# gateway and Prometheus under the same origin, so the browser needs no CORS
# support from the gateway (the gateway is deliberately CORS-free).
server {
    listen 8000;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # /gateway/v1/chat/completions -> http://gateway-api:8080/v1/chat/completions
    location /gateway/ {
        proxy_pass http://gateway-api:8080/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }

    # /prom/api/v1/query -> http://prometheus:9090/api/v1/query
    location /prom/ {
        proxy_pass http://prometheus:9090/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }
}
