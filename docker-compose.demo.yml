# Interactive-demo overlay for the base docker-compose.yml. Use with:
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml up -d --build
# (or: make demo-up / make demo).
#
# Same philosophy as the bench overlay: tuning knobs and *additional* read-only
# services, never topology changes to the core five. What it adds/changes:
#   - the mock backends get a realistic ~40ms latency (+5ms jitter) so the
#     cache and failover stories are visible to the eye, not just in metrics;
#   - RATE_LIMIT_QPS is raised to 1000 so burst scenarios exercise the cache /
#     breaker / batch paths instead of a wall of 429s. It is env-substitutable
#     (DEMO_RATE_LIMIT_QPS) so scripts/demo.sh can recreate just gateway-api
#     with a low limit for the rate-limit scenario, then restore it;
#   - Grafana (:3000) with an auto-provisioned datasource + dashboard, and
#     anonymous read-only access (no login wall in a demo);
#   - the static demo console (:8000) — plain nginx serving demo/console and
#     reverse-proxying the gateway and Prometheus so the browser stays
#     same-origin (no CORS changes to the gateway itself).
#
# Still exactly three Go binaries: grafana and nginx are external images, the
# same way prometheus already is.

services:
  gateway-api:
    environment:
      RATE_LIMIT_QPS: "${DEMO_RATE_LIMIT_QPS:-1000}"

  mock-llm-fast:
    environment:
      MOCK_LATENCY_MS: "${DEMO_MOCK_LATENCY_MS:-40}"
      MOCK_JITTER_MS: "${DEMO_MOCK_JITTER_MS:-5}"

  mock-llm-cheap:
    environment:
      MOCK_LATENCY_MS: "${DEMO_MOCK_LATENCY_MS:-40}"
      MOCK_JITTER_MS: "${DEMO_MOCK_JITTER_MS:-5}"

  grafana:
    image: grafana/grafana:11.5.1
    depends_on:
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_BASIC_ENABLED: "false"
      GF_USERS_DEFAULT_THEME: "dark"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/aegisroute.json"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

  demo-console:
    image: nginx:1.27-alpine
    depends_on:
      - gateway-api
      - prometheus
    volumes:
      - ./demo/console/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./demo/console/index.html:/usr/share/nginx/html/index.html:ro
    ports:
      - "8000:8000"
